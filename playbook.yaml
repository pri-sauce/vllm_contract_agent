# ============================================================
#  Company Contract Playbook
#  Edit company_name, legal_contact, and positions to match
#  your organisation's actual legal positions.
#  Run: python main.py kb-init   to load into the RAG database.
# ============================================================

company_name: "Sirena AI Systems Private Limited"
last_updated: "2026-03-05"
legal_contact: "legal@sirenatech.com"

# ------------------------------------------------------------------
# Clause-by-Clause Positions
# ------------------------------------------------------------------

clauses:
  limitation_of_liability:
    position: "Mutual cap at fees paid in the 12 months prior to the claim."
    must_have:
      - "Cap must be mutual (applies to both parties equally)"
      - "Cap defined as total fees paid in prior 12 months"
      - "Carve-outs for: IP infringement, confidentiality breach, gross negligence, willful misconduct, fraud"
    reject_if:
      - "Uncapped liability on our side"
      - "Consequential damages not excluded"
      - "Cap lower than 3 months of fees"
      - "Asymmetric cap (higher cap on us than on counterparty)"
    acceptable_fallback: "Cap of 6 months fees with mutual carve-outs for IP and confidentiality."

  indemnification:
    position: "Mutual indemnification limited to each party's own breach or negligence."
    must_have:
      - "Must be mutual (both parties bound)"
      - "Limited to claims arising from indemnifying party's own acts"
      - "Prompt notice requirement (within 30 days of becoming aware)"
      - "Right to control defense with reasonable cooperation from other party"
    reject_if:
      - "One-sided indemnification only against us"
      - "Indemnification for third-party claims without any scope limitation"
      - "No carve-out for indemnitee's own negligence"
    acceptable_fallback: "Mutual indemnification for IP infringement and data breach claims only."
    notes: >
      Indemnification clauses that cover 'third persons' without limiting to the indemnifying
      party's own acts create unlimited liability exposure — flag as HIGH risk.

  confidentiality:
    position: "Mutual NDA obligations with 5-year post-term survival."
    must_have:
      - "Mutual obligations (both parties bound equally)"
      - "Standard exceptions: publicly available, independently developed, received from third party"
      - "Return or destruction of confidential information on termination"
      - "Term limited to maximum 5 years post-termination"
    reject_if:
      - "Perpetual confidentiality obligation — we accept maximum 5 years"
      - "No exceptions for publicly available information"
      - "Unilateral obligation (only one party bound)"
    acceptable_fallback: "5-year confidentiality obligation with standard carve-outs is acceptable."

  intellectual_property:
    position: "We retain all IP we develop. Client gets limited non-exclusive license for deliverables only."
    must_have:
      - "Clear definition of background IP (pre-existing tools, methodologies)"
      - "License to client is limited, non-exclusive, non-transferable"
      - "We retain ownership of tools, methodologies, general know-how, platform improvements"
    reject_if:
      - "Broad work-for-hire or unqualified assignment of all IP to client"
      - "Assignment includes pre-existing IP or background IP"
      - "Client owns improvements to our platform or AI systems"
      - "'Unqualified and unconditional right' to use all work product — HIGH risk"
    acceptable_fallback: "Custom deliverables may be assigned to client upon full payment, excluding background IP."

  term_termination:
    position: "1-year initial term. 90-day notice for termination for convenience."
    must_have:
      - "Right to terminate for cause with minimum 30-day cure period"
      - "Termination right for insolvency or change of control"
      - "Defined term duration (not open-ended or indefinite)"
    reject_if:
      - "No termination for convenience right"
      - "Cure period shorter than 30 days for material breach — flag as HIGH risk"
      - "Auto-renewal without minimum 60-day advance notice period"
      - "Termination notice period exceeding 90 days (creates excessive lock-in) — HIGH risk"
      - "10-day cure period for default — flag as MEDIUM risk (industry standard is 30 days)"
    acceptable_fallback: "60-day notice for termination for convenience is acceptable."
    notes: >
      A 120-day termination notice period is excessive and creates significant lock-in risk.
      The industry standard for professional services is 30-60 days.
      A 10-day cure period for breach (as in Section 4B of government contracts) should be
      flagged as MEDIUM risk — not HIGH — since some cure period exists, just too short.

  payment:
    position: "Net 30 payment terms. Late fees at 1.5% per month on overdue amounts."
    must_have:
      - "Clear payment milestones or defined payment schedule"
      - "Late payment interest clause (1.5% per month or statutory rate)"
      - "Right to suspend services for non-payment after 30-day written notice"
    reject_if:
      - "Net 90 or longer payment terms"
      - "No interest or penalty on late payments — flag as MEDIUM risk"
      - "Client right to set-off without prior written notice"
      - "Invoicing deadline shorter than 30 days after service delivery"
      - "No payment schedule at all (only a cap amount) — flag as HIGH risk"
    acceptable_fallback: "Net 45 is acceptable for enterprise or government clients."
    notes: >
      A clause that only sets a total cap ('not to exceed $X') without a payment schedule
      or milestones is HIGH risk because there is no enforceable mechanism to trigger payment.
      Net 45 invoicing window for government clients (like transportation commissions) is standard.

  governing_law:
    position: "Prefer California or Delaware. Will accept client's home jurisdiction if reasonable."
    acceptable:
      - "California"
      - "Delaware"
      - "New York"
      - "England and Wales"
      - "India (Karnataka / Delhi)"
    reject_if:
      - "Jurisdiction with which we have no presence or operations"
      - "Mandatory binding arbitration with no opt-out for injunctive relief"
    acceptable_fallback: "Client's home jurisdiction is acceptable if in the list above."

  data_privacy:
    position: "We comply with GDPR and India DPDP Act 2023. DPA required for any personal data processing."
    must_have:
      - "Data Processing Agreement (DPA) if personal data is involved"
      - "Clear definition of data controller vs processor roles"
      - "Security measures and 72-hour breach notification requirement"
    reject_if:
      - "Transfer of personal data to countries without adequacy decisions and no SCCs"
      - "No data breach notification obligation"
      - "Unlimited or undefined data retention"

  insurance:
    position: "Consultant should maintain professional liability and general liability insurance."
    must_have:
      - "Professional liability / E&O insurance minimum $1,000,000"
      - "General liability minimum $1,000,000"
      - "30-day advance notice of cancellation required"
    reject_if:
      - "Immediate termination for insurance lapse with no cure period — flag as HIGH risk"
      - "Unilateral right to perform all insurance acts without notice or cooperation requirement"
    acceptable_fallback: "Minimum $500,000 professional liability acceptable for small engagements under $50k."
    notes: >
      The right for a party to act under insurance policies should include a cooperation
      requirement. 'At its sole direction, but is not obligated to' without any notice
      or cooperation clause is a genuine concern — flag as MEDIUM risk.
      Insurance termination clauses should require a 30-day cure period, not immediate termination.

  warranties:
    position: "Standard professional services warranties: skill, care, compliance with applicable law."
    must_have:
      - "Warranty of professional skill and care"
      - "Warranty of compliance with applicable laws"
    reject_if:
      - "Warranty that work product will be error-free or meet undefined standards"
      - "Perpetual warranty obligations without limitation"
    acceptable_fallback: "Industry-standard disclaimers of implied warranties are acceptable."
    notes: >
      IMPORTANT: 'Reasonably satisfactory' is a standard California legal phrase meaning the
      objective reasonable person standard — NOT a subjective or one-sided term.
      Do NOT flag this as HIGH risk. It is standard, enforceable, and commonly used in
      California professional services contracts.

  notices:
    position: "Registered mail, overnight courier, or email with confirmation acceptable."
    must_have:
      - "Defined method of delivery"
      - "Address for notices specified or mechanism to update it"
    reject_if:
      - "No notice mechanism defined at all for a substantive obligation"
    acceptable_fallback: "Email notices are acceptable for operational notices."

  assignment:
    position: "Neither party may assign without prior written consent. Change of control counts as assignment."
    must_have:
      - "Consent required for assignment"
    reject_if:
      - "Unilateral right to assign without consent"
    acceptable_fallback: "Assignment to affiliates with written notice (no consent required) is acceptable."

  independent_contractor:
    position: "Consultant is an independent contractor. Explicit classification required."
    must_have:
      - "Explicit independent contractor designation"
      - "Consultant responsible for own taxes, insurance, and benefits"
      - "Consultant retains right to control manner and means of work"
    reject_if:
      - "Language that could establish employer-employee relationship"
      - "Absence of any independent contractor designation"
    notes: >
      The California Borello test factors (like 'usually done by a specialist without supervision')
      are INTENTIONAL language supporting independent contractor classification — not a misclassification
      risk. Do NOT flag standard Borello test factors as HIGH risk.
      'COMMISSION' and 'CONSULTANT' are defined terms in government contracts — not ambiguous.

  dispute_resolution:
    position: "Governing law of California. Disputes resolved by negotiation then litigation."
    must_have:
      - "Governing law specified"
      - "Dispute escalation process before litigation"
    reject_if:
      - "Mandatory binding arbitration with no opt-out for injunctive relief"
      - "One-sided dispute committee with only one party's representatives — HIGH risk"
    acceptable_fallback: "Mediation before litigation is acceptable."
    notes: >
      A dispute resolution committee consisting only of the other party's own representatives
      (e.g. Contract Manager and Executive Director of the same organisation) creates genuine
      bias risk — flag as HIGH risk. Both parties should have representation.

# ------------------------------------------------------------------
# Deal Type Notes
# ------------------------------------------------------------------

deal_types:
  professional_services:
    extra_requirements:
      - "Change order process for scope changes"
      - "Acceptance criteria for deliverables"
      - "Payment tied to milestones, not just elapsed time"

  government_contract:
    extra_requirements:
      - "Compliance with applicable public procurement rules"
      - "Audit rights for government auditors"
      - "Prevailing wage compliance where applicable"
    notes: >
      Government contracts use defined terms like 'COMMISSION' (for the government body)
      and 'CONSULTANT' (for the contractor). These are NOT ambiguous — they are defined
      in the contract preamble. Do not flag them as confusing entity references.
      Net 45 invoicing (not Net 30) is standard and acceptable for government clients.

  saas:
    extra_requirements:
      - "SLA with uptime guarantee minimum 99.5%"
      - "Data portability right on termination"
      - "Security audit rights (annual)"

  nda:
    extra_requirements:
      - "Purpose limitation clause"
      - "Maximum 5-year term"
      - "Mutual obligations"